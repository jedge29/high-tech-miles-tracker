<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ShiftTrack Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --bg: #000000; --card: #161b22; --primary: #2f81f7; --success: #238636; --text: #c9d1d9; --accent: #79c0ff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 420px; }
        #disclaimer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; padding: 30px; box-sizing: border-box; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #30363d; }
        h1 { text-align: center; color: var(--accent); font-size: 22px; margin: 10px 0; letter-spacing: 1px; }
        label { font-size: 11px; font-weight: bold; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #30363d; background: #0d1117; color: white; font-size: 16px; box-sizing: border-box; }
        .preset-tag { display: inline-block; background: #21262d; padding: 6px 12px; border-radius: 20px; font-size: 12px; margin: 0 5px 8px 0; border: 1px solid #30363d; cursor: pointer; color: var(--accent); }
        button { width: 100%; padding: 18px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-start { background: var(--primary); color: white; }
        .btn-stop { background: var(--success); color: white; }
        .btn-copy { background: #d29922; color: white; margin-top: 10px; }
        .reminder { text-align: center; color: #f85149; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        #log-output { background: #0d1117; padding: 15px; border-radius: 10px; font-family: monospace; color: #39d353; border: 1px solid #30363d; font-size: 13px; white-space: pre-wrap; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="disclaimer-overlay">
    <div>
        <h2 style="color:white; font-size: 24px;">Usage Agreement</h2>
        <p style="color: #8b949e; line-height: 1.6;">To ensure accurate pay and privacy:<br><br>1. Start tracking at departure.<br>2. Stop tracking immediately on arrival.<br>3. Do not use phone while driving.</p>
        <button class="btn-start" onclick="document.getElementById('disclaimer-overlay').style.display='none'">I AGREE</button>
    </div>
</div>

<div id="app">
    <h1>SHIFTTRACK PRO</h1>

    <div id="view-setup" class="card">
        <label>Resident Presets</label>
        <div id="res-presets"></div>
        <input type="text" id="input-res" placeholder="Resident Name">
        
        <label>Destination Presets</label>
        <div id="dest-presets"></div>
        <input type="text" id="input-dest" placeholder="Next Stop?">
        
        <button class="btn-start" onclick="startTracking()">START TRIP</button>
    </div>

    <div id="view-active" class="card hidden">
        <div class="reminder">⚠️ LIVE TRACKING: STOP UPON ARRIVAL</div>
        <div style="text-align:center; font-size:42px; font-weight:800; margin:10px 0; color:white;" id="live-miles">0.00 mi</div>
        <button class="btn-stop" onclick="arrive()">I HAVE ARRIVED</button>
    </div>

    <div class="card">
        <label>Current Shift Report</label>
        <div id="log-output">No data.</div>
        <button class="btn-copy" onclick="copyLogs()">COPY FOR OFFICE</button>
        <button style="background:transparent; color:#f85149; font-size:11px; text-decoration:underline; margin-top:10px;" onclick="resetAll()">Reset All Data</button>
    </div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('st_logs')) || [];
    let presets = JSON.parse(localStorage.getItem('st_presets')) || { res: [], dest: [] };
    let watchId, startPos, currentMiles = 0;

    function render() {
        document.getElementById('res-presets').innerHTML = presets.res.slice(-5).map(r => `<span class="preset-tag" onclick="set('input-res','${r}')">${r}</span>`).join('');
        document.getElementById('dest-presets').innerHTML = presets.dest.slice(-5).map(d => `<span class="preset-tag" onclick="set('input-dest','${d}')">${d}</span>`).join('');
        let text = logs.length ? "--- SHIFT REPORT ---\n" : "No data.";
        let total = 0; logs.forEach(l => { text += `${l.res}: ${l.dest} (${l.miles} mi)\n`; total += parseFloat(l.miles); });
        if(logs.length) text += `\nTOTAL MILES: ${total.toFixed(2)}`;
        document.getElementById('log-output').innerText = text;
    }

    function set(id, v) { document.getElementById(id).value = v; }

    function getDist(p1, p2) {
        const R = 3958.8;
        const dLat = (p2.latitude - p1.latitude) * Math.PI / 180;
        const dLon = (p2.longitude - p1.longitude) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(p1.latitude * Math.PI/180) * Math.cos(p2.latitude * Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function startTracking() {
        const r = document.getElementById('input-res').value;
        const d = document.getElementById('input-dest').value;
        if(!r || !d) return alert("Missing Info!");
        if(!presets.res.includes(r)) presets.res.push(r);
        if(!presets.dest.includes(d)) presets.dest.push(d);
        localStorage.setItem('st_presets', JSON.stringify(presets));
        navigator.geolocation.getCurrentPosition(p => {
            startPos = p.coords;
            document.getElementById('view-setup').classList.add('hidden');
            document.getElementById('view-active').classList.remove('hidden');
            watchId = navigator.geolocation.watchPosition(pos => {
                currentMiles = getDist(startPos, pos.coords);
                document.getElementById('live-miles').innerText = currentMiles.toFixed(2) + " mi";
            }, null, {enableHighAccuracy:true});
        }, () => alert("Enable GPS!"));
    }

    function arrive() {
        navigator.geolocation.clearWatch(watchId);
        logs.push({ res: document.getElementById('input-res').value, dest: document.getElementById('input-dest').value, miles: currentMiles.toFixed(2) });
        localStorage.setItem('st_logs', JSON.stringify(logs));
        document.getElementById('view-setup').classList.remove('hidden');
        document.getElementById('view-active').classList.add('hidden');
        document.getElementById('input-dest').value = "";
        render();
    }

    function copyLogs() { navigator.clipboard.writeText(document.getElementById('log-output').innerText); alert("Report Copied!"); }
    function resetAll() { if(confirm("Clear Everything?")) { localStorage.clear(); location.reload(); } }
    render();
</script>
</body>
</html>

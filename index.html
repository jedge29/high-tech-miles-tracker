<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Twyford Care Mileage Tracker</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Twyford Tracker">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Twyford%20Care%20Mileage%20Tracker%22,%22short_name%22:%22Twyford%20Tracker%22,%22display%22:%22standalone%22,%22start_url%22:%22/%22}">

    <style>
        :root { 
            --bg: #f0f4f8; --card: #ffffff; --primary: #0070f3; 
            --success: #27ae60; --text: #334155; --label: #64748b;
            --accent: #7c3aed; --warning: #f59e0b; --border: #e2e8f0;
        }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 420px; }
        #disclaimer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        h1 { text-align: center; color: var(--primary); font-size: 18px; margin: 10px 0; font-weight: 800; text-transform: uppercase; }
        label { font-size: 11px; font-weight: 700; color: var(--label); text-transform: uppercase; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 14px; margin: 5px 0 15px 0; border-radius: 12px; border: 2px solid var(--border); background: #f8fafc; color: var(--text); font-size: 16px; box-sizing: border-box; outline: none; }
        
        .preset-tag { 
            display: inline-flex; align-items: center; background: #edf2f7; 
            padding: 6px 12px; border-radius: 25px; font-size: 13px; 
            margin: 0 5px 8px 0; border: 1px solid var(--border); color: var(--primary); font-weight: 600; cursor: pointer; 
        }
        .del-btn { margin-left: 8px; color: #ef4444; font-size: 18px; }
        
        button { width: 100%; padding: 18px; border-radius: 14px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .btn-start { background: var(--primary); color: white; }
        .btn-stop { background: var(--success); color: white; }
        .btn-next { background: var(--accent); color: white; }
        .btn-home { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); }
        .btn-copy { background: var(--warning); color: white; }

        #log-output { background: #f8fafc; padding: 15px; border-radius: 12px; font-family: monospace; border: 1px solid var(--border); font-size: 13px; white-space: pre-wrap; line-height: 1.5; }
        .hidden { display: none; }
        .live-indicator { text-align: center; font-size: 11px; color: #ef4444; font-weight: 800; margin-bottom: 10px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div id="disclaimer-overlay">
    <div class="card">
        <h2 style="color:var(--primary); margin-top:0;">Hi Guys! 👋</h2>
        <p>I made this <b>Twyford Care Mileage Tracker</b> to make our life easier. Just start a trip when we leave, and at the end of the shift, <b>Copy Report</b> to send your miles over.</p>
        <button class="btn-start" onclick="document.getElementById('disclaimer-overlay').style.display='none'">START TRACKER</button>
    </div>
</div>

<div id="app">
    <h1>Twyford Care</h1>

    <div id="view-setup" class="card">
        <label>Who are you supporting?</label>
        <div id="res-presets"></div>
        <input type="text" id="input-res" placeholder="Name">
        
        <label>Where are we off to?</label>
        <div id="dest-presets"></div>
        <input type="text" id="input-dest" placeholder="Destination">
        
        <button class="btn-start" onclick="startTracking()">START TRIP</button>
    </div>

    <div id="view-active" class="card hidden">
        <div class="live-indicator">● LIVE TRACKING ACTIVE</div>
        <div style="text-align:center; font-size:48px; font-weight:900; margin:10px 0;" id="live-miles">0.00 mi</div>
        <button class="btn-stop" id="main-stop-btn" onclick="arrive()">I'VE ARRIVED</button>
        
        <div id="post-arrival-options" class="hidden">
            <button class="btn-next" onclick="prepareNextLeg()">➕ ADD ANOTHER STOP</button>
            <button class="btn-home" onclick="finishAndHome()">🏠 FINISH & RETURN BASE</button>
        </div>
    </div>

    <div class="card">
        <label>Daily Report</label>
        <div id="log-output">No trips logged today.</div>
        <button class="btn-copy" onclick="copyLogs()">COPY REPORT</button>
        <button style="background:transparent; color:#94a3b8; font-size:11px; text-decoration:underline;" onclick="resetAll()">Clear Shift Data</button>
    </div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('st_logs')) || [];
    let presets = JSON.parse(localStorage.getItem('st_presets')) || { res: [], dest: [] };
    let watchId, startPos, currentMiles = 0;

    function render() {
        const resDiv = document.getElementById('res-presets');
        const destDiv = document.getElementById('dest-presets');
        
        resDiv.innerHTML = presets.res.map((r, i) => `
            <span class="preset-tag" onclick="set('input-res','${r}')">${r} 
                <span class="del-btn" onclick="deletePreset(event, 'res', ${i})">×</span>
            </span>`).join('');

        destDiv.innerHTML = presets.dest.map((d, i) => `
            <span class="preset-tag" onclick="set('input-dest','${d}')">${d} 
                <span class="del-btn" onclick="deletePreset(event, 'dest', ${i})">×</span>
            </span>`).join('');

        let text = logs.length ? "--- TWYFORD CARE REPORT ---\n" : "No trips logged today.";
        let total = 0; 
        logs.forEach(l => { 
            text += `• ${l.res}: ${l.dest} (${l.miles} mi)\n`; 
            total += parseFloat(l.miles); 
        });
        if(logs.length) text += `\nTOTAL MILES: ${total.toFixed(2)}`;
        document.getElementById('log-output').innerText = text;
    }

    function deletePreset(e, type, index) {
        e.stopPropagation();
        presets[type].splice(index, 1);
        localStorage.setItem('st_presets', JSON.stringify(presets));
        render();
    }

    function set(id, v) { document.getElementById(id).value = v; }

    function getDist(p1, p2) {
        const R = 3958.8;
        const dLat = (p2.latitude - p1.latitude) * Math.PI / 180;
        const dLon = (p2.longitude - p1.longitude) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(p1.latitude * Math.PI/180) * Math.cos(p2.latitude * Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function startTracking() {
        const r = document.getElementById('input-res').value;
        const d = document.getElementById('input-dest').value;
        if(!r || !d) return alert("Please fill in both boxes!");

        if(!presets.res.includes(r)) presets.res.push(r);
        if(!presets.dest.includes(d)) presets.dest.push(d);
        localStorage.setItem('st_presets', JSON.stringify(presets));

        navigator.geolocation.getCurrentPosition(p => {
            startPos = p.coords;
            currentMiles = 0;
            document.getElementById('view-setup').classList.add('hidden');
            document.getElementById('view-active').classList.remove('hidden');
            document.getElementById('main-stop-btn').classList.remove('hidden');
            document.getElementById('post-arrival-options').classList.add('hidden');
            
            watchId = navigator.geolocation.watchPosition(pos => {
                currentMiles = getDist(startPos, pos.coords);
                document.getElementById('live-miles').innerText = currentMiles.toFixed(2) + " mi";
            }, null, {enableHighAccuracy:true});
        }, () => alert("GPS is needed!"));
    }

    function arrive() {
        navigator.geolocation.clearWatch(watchId);
        logs.push({ 
            res: document.getElementById('input-res').value, 
            dest: document.getElementById('input-dest').value, 
            miles: currentMiles.toFixed(2) 
        });
        localStorage.setItem('st_logs', JSON.stringify(logs));
        document.getElementById('main-stop-btn').classList.add('hidden');
        document.getElementById('post-arrival-options').classList.remove('hidden');
        render();
    }

    function prepareNextLeg() {
        const nextStop = prompt("Where next?", "");
        if (nextStop) {
            document.getElementById('input-dest').value = nextStop;
            startTracking();
        }
    }

    function finishAndHome() {
        document.getElementById('view-setup').classList.remove('hidden');
        document.getElementById('view-active').classList.add('hidden');
        document.getElementById('input-dest').value = "";
        render();
    }

    function copyLogs() { 
        navigator.clipboard.writeText(document.getElementById('log-output').innerText);
        alert("Report copied!");
    }
    
    function resetAll() { 
        if(confirm("Clear today's trips?")) { 
            localStorage.removeItem('st_logs'); 
            logs = [];
            render(); 
        } 
    }
    
    render();
</script>
</body>
</html>

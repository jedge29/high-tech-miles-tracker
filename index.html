<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mileage Assistant: Auto-Remind</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #6366f1; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; margin: 0; padding: 15px; }
        .container { width: 100%; max-width: 450px; padding-bottom: 140px; }
        .main-card { background: var(--card); border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        
        /* ALERT BANNER */
        .reminder-banner { background: var(--warning); color: black; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 14px; margin-bottom: 15px; text-align: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); background: #fff; } 100% { transform: scale(1); } }

        .input-row { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 800; margin-bottom: 4px; }
        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; color: white; font-size: 16px; outline: none; }
        
        .tag { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.2); color: #cbd5e1; padding: 8px 14px; border-radius: 10px; font-size: 12px; cursor: pointer; display: inline-block; margin: 2px; }
        
        .btn { width: 100%; padding: 20px; border-radius: 16px; border: none; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #startBtn { background: var(--primary); color: white; }
        #stopBtn { background: var(--danger); color: white; display: none; }
        #returnBtn { background: var(--success); color: white; display: none; }

        .trip-item { background: #1e293b; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div id="banner" class="reminder-banner">⚠️ APP READY: ENTER NAMES</div>
        
        <div class="input-row">
            <label>Resident(s)</label>
            <input type="text" id="resName" placeholder="Who is with you?">
        </div>
        
        <div class="input-row">
            <label>From</label>
            <input type="text" id="fromLoc" value="House">
        </div>

        <div class="input-row">
            <label>To (Destination)</label>
            <div id="quickTags" style="margin-bottom:10px;"></div>
            <input type="text" id="toLoc" placeholder="Where to?">
            <button onclick="saveNewPlace()" style="margin-top:5px; background:none; color:var(--primary); border:none; font-size:11px; cursor:pointer;">+ Save this location</button>
        </div>

        <button id="startBtn" class="btn" onclick="begin()">▶ START JOURNEY</button>
        <button id="stopBtn" class="btn" onclick="finish()">■ ARRIVED (STOP LOG)</button>
        <button id="returnBtn" class="btn" onclick="prepareReturn()">🔄 START RETURN TRIP</button>
    </div>

    <div id="tripList" style="margin-top:30px;"></div>
</div>

<div style="position:fixed; bottom:0; left:0; right:0; background:#1e293b; padding:20px; border-top:2px solid var(--primary); text-align:center;">
    <button class="btn" style="background:var(--success); color:white; margin:0; padding:12px;" onclick="copyFullReport()">COPY ALL LOGS 📋</button>
</div>

<script>
    let startCoords = null, startTime = null, trips = [], totalMiles = 0;
    let savedPlaces = JSON.parse(localStorage.getItem('myPlaces')) || ['Supermarket', 'GP Surgery', 'Park', 'House'];

    // Audio Reminders
    const speech = window.speechSynthesis;
    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        speech.speak(msg);
    }

    function renderPlaces() {
        const container = document.getElementById('quickTags');
        container.innerHTML = "";
        savedPlaces.forEach(p => {
            const d = document.createElement('div'); d.className = 'tag'; d.innerText = p;
            d.onclick = () => { document.getElementById('toLoc').value = p; alertRemind("Destination set. Click Start Journey."); };
            container.appendChild(d);
        });
    }

    function alertRemind(msg, color="#f59e0b") {
        const b = document.getElementById('banner');
        b.innerText = msg;
        b.style.background = color;
        // Optional: play a "ding" sound if you have one
    }

    function begin() {
        if (!document.getElementById('resName').value || !document.getElementById('toLoc').value) {
            speak("Please enter resident name and destination.");
            return;
        }
        navigator.geolocation.getCurrentPosition((pos) => {
            startCoords = pos.coords;
            startTime = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('stopBtn').style.display = "block";
            alertRemind("🚨 DRIVING: DON'T CLOSE APP", "#ef4444");
            speak("Journey started. Drive safely.");
        }, (err) => alert("GPS Error"), {enableHighAccuracy:true});
    }

    function finish() {
        navigator.geolocation.getCurrentPosition((pos) => {
            const miles = calcDist(startCoords.latitude, startCoords.longitude, pos.coords.latitude, pos.coords.longitude);
            trips.push({
                res: document.getElementById('resName').value,
                desc: "Outward to " + document.getElementById('toLoc').value,
                miles: miles.toFixed(2),
                time: startTime + " - " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            });
            totalMiles += miles;
            updateUI();
            
            document.getElementById('stopBtn').style.display = "none";
            document.getElementById('returnBtn').style.display = "block";
            alertRemind("⌛ AT DESTINATION: START RETURN TRIP LATER", "#22c55e");
            speak("Journey logged. Don't forget to start the return trip when you leave.");
        });
    }

    function prepareReturn() {
        const oldTo = document.getElementById('toLoc').value;
        const oldFrom = document.getElementById('fromLoc').value;
        document.getElementById('fromLoc').value = oldTo;
        document.getElementById('toLoc').value = oldFrom;
        
        document.getElementById('returnBtn').style.display = "none";
        document.getElementById('startBtn').style.display = "block";
        document.getElementById('startBtn').innerText = "▶ START RETURN JOURNEY";
        alertRemind("🔄 READY FOR RETURN", "#6366f1");
        speak("Ready for return. Click start when you begin driving.");
    }

    function saveNewPlace() {
        const val = document.getElementById('toLoc').value;
        if(val && !savedPlaces.includes(val)) {
            savedPlaces.push(val);
            localStorage.setItem('myPlaces', JSON.stringify(savedPlaces));
            renderPlaces();
            alert("Location saved!");
        }
    }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 3958.8;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function updateUI() {
        const list = document.getElementById('tripList'); list.innerHTML = "";
        trips.forEach(t => {
            const div = document.createElement('div'); div.className = "trip-item";
            div.innerHTML = `<strong>👤 ${t.res}</strong><br>${t.desc}<br><b>${t.miles} miles</b>`;
            list.prepend(div);
        });
    }

    function copyFullReport() {
        let r = "SHIFT LOG:\n";
        trips.forEach(t => r += `${t.res}: ${t.desc} (${t.miles} mi)\n`);
        navigator.clipboard.writeText(r);
        alert("Copied!");
    }

    renderPlaces();
</script>
</body>
</html>
